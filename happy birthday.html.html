<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение на День Рождения!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        h1 {
            color: #e74c3c;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        .details {
            margin: 30px 0;
            font-size: 1.2em;
        }
        .btn {
            display: inline-block;
            padding: 12px 25px;
            background-color: #e74c3c;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s;
            margin: 10px;
        }
        .btn:hover {
            background-color: #c0392b;
            transform: translateY(-3px);
        }
        footer {
            margin-top: 40px;
            font-style: italic;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉Приглашение на День Рождения!🎉</h1>
        
        <p>Я приглашаю вас отпраздновать мой День Рождения!</p>
        
        <div class="details">
            <p><strong>Дата:</strong> 16 мая 2026 года</p>
            <p><strong>Место:</strong> Кафе "Алекс", ул.Краснополянская 17</p>
        </div>
        
        <p><strong>Сбор гостей в 17:00</strong></p>
        
        <a href="tel:+79127810737" class="btn">Позвонить для подтверждения</a>
        
        <footer>
           🎉🎉🎉 <br>
        </footer>
    </div>
</body>
</html>
